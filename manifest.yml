workflows:
- name: spec-driven
  file: workflows/spec-driven.md
  description: Full specification upfront, phased delivery with formal gates
  cadence: milestone-based
  best_for:
  - regulated
  - safety-critical
  - contractual
  - large-team
- name: agile-sprint
  file: workflows/agile-sprint.md
  description: Iterative sprints, just-enough planning, continuous delivery
  cadence: 1-2 week sprints
  best_for:
  - product-teams
  - saas
  - startup
  - rapid-iteration
- name: iterative-waterfall
  file: workflows/iterative-waterfall.md
  description: Phase-gated with iteration within phases
  cadence: phase-based (2-6 weeks per phase)
  best_for:
  - enterprise
  - pc-compliance
  - large-scope
  - distributed-teams
- name: hotfix
  file: workflows/hotfix.md
  description: 'Emergency path: diagnose, fix, verify, deploy'
  cadence: on-demand (hours)
  best_for:
  - production-incidents
  - security-vulnerabilities
  - data-corruption
- name: greenfield
  file: workflows/greenfield.md
  description: New project bootstrap from idea to first deployment
  cadence: one-time (days to weeks)
  best_for:
  - new-products
  - proof-of-concept
  - hackathon
- name: brownfield
  file: workflows/brownfield.md
  description: Legacy system modernization and incremental improvement
  cadence: ongoing (months)
  best_for:
  - legacy-modernization
  - platform-migration
  - tech-debt-paydown
