version: 1.0.0
name: prodcraft
description: Lifecycle-aware skills system for production-grade software development

# Declared iterative feedback edges in the artifact_flow graph.
# These are intentional backward flows (later-phase skill feeding earlier-phase skill)
# that represent the review-and-revise loops inherent in software development.
# The acyclicity validator skips these edges when checking for unintended cycles.
iterative_feedback_edges:
- from: pc-code-review
  to: pc-feature-development
  rationale: Review findings (review-report) feed back into the implementation cycle.
- from: pc-code-review
  to: pc-refactoring
  rationale: Review findings trigger targeted pc-refactoring before re-review.
- from: pc-security-audit
  to: pc-feature-development
  rationale: Security findings (security-report) require implementation changes before re-audit.
- from: pc-tech-selection
  to: pc-system-design
  rationale: Technology decisions (tech-decision-record) update the architecture iteratively.
- from: pc-tdd
  to: pc-feature-development
  rationale: Test suite shapes the implementation loop within the same phase.
- from: pc-refactoring
  to: pc-feature-development
  rationale: Refactored source re-enters the pc-feature-development cycle for integration.

phases:
- id: 00-discovery
  name: Discovery
  purpose: Understand the problem space, validate feasibility, identify opportunities
  entry_from:
  - 08-evolution
  exit_to:
  - 01-specification
  gate: Feasibility approved and opportunity validated
- id: 01-specification
  name: Specification
  purpose: Define what to build with precision and clarity
  entry_from:
  - 00-discovery
  exit_to:
  - 02-architecture
  gate: Spec reviewed, acceptance criteria defined, stakeholders signed off
- id: 02-architecture
  name: Architecture
  purpose: Design how to build it -- system structure, interfaces, data, security
  entry_from:
  - 01-specification
  exit_to:
  - 03-planning
  gate: Architecture review passed, ADRs documented, risks assessed
- id: 03-planning
  name: Planning
  purpose: Break work into actionable tasks, estimate, assign, sequence
  entry_from:
  - 02-architecture
  exit_to:
  - 04-implementation
  gate: Tasks estimated, dependencies mapped, risks mitigated
- id: 04-implementation
  name: Implementation
  purpose: Write code, tests, and documentation -- build the thing
  entry_from:
  - 03-planning
  exit_to:
  - 05-quality
  gate: Feature complete, all tests pass, code reviewed
- id: 05-quality
  name: Quality
  purpose: Verify correctness, security, performance, and user experience
  entry_from:
  - 04-implementation
  exit_to:
  - 06-delivery
  gate: QA sign-off, security cleared, performance within SLOs
- id: 06-delivery
  name: Delivery
  purpose: Package, deploy, and release to users safely
  entry_from:
  - 05-quality
  exit_to:
  - 07-operations
  gate: Deployed to production, rollback verified, metrics baseline established
- id: 07-operations
  name: Operations
  purpose: Monitor, respond to incidents, ensure reliability
  entry_from:
  - 06-delivery
  exit_to:
  - 08-evolution
  gate: SLOs met, runbooks validated, on-call handoff complete
- id: 08-evolution
  name: Evolution
  purpose: Learn, improve, manage technical debt, plan next iteration
  entry_from:
  - 07-operations
  exit_to:
  - 00-discovery
  gate: Retrospective complete, tech debt cataloged, next cycle planned
