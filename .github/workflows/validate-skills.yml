# Validate Prodcraft skill structure on PR
name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'workflows/**'
      - 'personas/**'
      - 'docs/**'
      - 'schemas/**'
      - 'rules/**'
      - 'eval/**'
      - 'tests/**'
      - '.github/workflows/validate-skills.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'manifest.yml'
      - 'README.md'
      - 'README.*.md'
      - 'scripts/**'
      - 'templates/**'

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validator dependencies
        run: python -m pip install pyyaml jsonschema

      - name: Validate Prodcraft structure
        run: python scripts/validate_prodcraft.py

      - name: Run contract tests
        run: python -m unittest discover tests
