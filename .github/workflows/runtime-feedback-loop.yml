name: Runtime Feedback Loop

on:
  workflow_dispatch:
    inputs:
      exact_accounting_paths:
        description: 'Optional newline-separated JSONL paths for a scoped exact-accounting threshold gate.'
        required: false
        type: string
  schedule:
    - cron: '0 3 1 * *'
  pull_request:
    paths:
      - '.github/workflows/runtime-feedback-loop.yml'
      - 'scripts/summarize_execution_observability.py'
      - 'rules/execution-observability-thresholds.yml'
      - 'docs/observability/runtime-feedback-loop.md'
      - '**/*observability*.jsonl'

jobs:
  summarize-observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install script dependencies
        run: python -m pip install pyyaml

      - name: Collect observability inputs
        id: collect
        run: |
          mapfile -t files < <(find . -type f \( -name '*observability*.jsonl' -o -name 'execution-observability.jsonl' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_inputs=false" >> "$GITHUB_OUTPUT"
            echo "No observability JSONL inputs found. Leaving the run as a no-op."
            exit 0
          fi

          printf '%s\n' "${files[@]}" > observability-inputs.txt
          echo "has_inputs=true" >> "$GITHUB_OUTPUT"

      - name: Summarize checked-in observability history
        if: steps.collect.outputs.has_inputs == 'true'
        run: |
          mkdir -p build
          python scripts/summarize_execution_observability.py \
            $(cat observability-inputs.txt) \
            --output build/legacy-execution-observability-summary.json

      - name: Collect scoped exact-accounting inputs
        id: collect_exact
        if: github.event_name == 'workflow_dispatch' && inputs.exact_accounting_paths != ''
        env:
          EXACT_ACCOUNTING_PATHS: ${{ inputs.exact_accounting_paths }}
        run: |
          : > exact-accounting-inputs.txt
          while IFS= read -r candidate; do
            if [ -z "$candidate" ]; then
              continue
            fi
            if [ ! -e "$candidate" ]; then
              echo "::error::Exact-accounting input not found: $candidate"
              exit 1
            fi
            printf '%s\n' "$candidate" >> exact-accounting-inputs.txt
          done <<< "$EXACT_ACCOUNTING_PATHS"

          if [ ! -s exact-accounting-inputs.txt ]; then
            echo "has_exact_inputs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_exact_inputs=true" >> "$GITHUB_OUTPUT"

      - name: Run scoped exact-accounting threshold gate
        if: steps.collect_exact.outputs.has_exact_inputs == 'true'
        run: |
          mkdir -p build
          python scripts/validate_execution_observability.py \
            $(cat exact-accounting-inputs.txt)
          python scripts/summarize_execution_observability.py \
            $(cat exact-accounting-inputs.txt) \
            --thresholds rules/execution-observability-thresholds.yml \
            --output build/exact-accounting-summary.json \
            --fail-on-breach

      - name: Upload summary artifact
        if: steps.collect.outputs.has_inputs == 'true' || steps.collect_exact.outputs.has_exact_inputs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: execution-observability-summary
          path: |
            build/legacy-execution-observability-summary.json
            build/exact-accounting-summary.json
          if-no-files-found: ignore
